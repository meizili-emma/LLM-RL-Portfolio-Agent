name: portfolio_agent

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Core scientific stack
  - numpy
  - pandas
  - pyarrow
  - matplotlib
  - pyyaml
  - tqdm

  # Data access and market calendar
  - requests
  - yfinance
  - pandas-market-calendars

  # LLM and structured-output stack
  - openai
  - pydantic
  - tenacity
  - langchain
  - langchain-openai

  # Development
  - jupyterlab

  - pip:
      # Financial data APIs
      - newsapi-python
      - fredapi

      # Technical indicators
      - pandas-ta-classic

      # Reinforcement learning stack
      - stable-baselines3
      - gymnasium
      - torch